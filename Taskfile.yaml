version: "3"

silent: true

vars:
  PYTHON_VERSION: "3.14"

tasks:
  default:
    desc: Run the default task
    cmd: task --list

  init:
    desc: Initialize the project
    cmds:
      - uv python install {{.PYTHON_VERSION}} --compile-bytecode
      - uv venv --python {{.PYTHON_VERSION}} --clear
      - uv sync --compile-bytecode

  clear-cache:
    desc: Clear the project
    cmds:
      - uv cache prune

  lint:
    desc: "Run linters to check code quality."
    cmds:
      - uv run ruff check {{.CLI_ARGS}}

  fmt:
    desc: "Format code using uv."
    cmds:
      - uv run ruff format {{.CLI_ARGS}}

  type:
    desc: "Run type checking using ty."
    cmds:
      - uv run ty check {{.CLI_ARGS}}

  run:
    desc: "Run the CLI entrypoint"
    cmds:
      - uv run python -m dtrack {{.CLI_ARGS}}

  test:
    desc: "Run tests."
    cmds:
      - uv run pytest --cov=src {{.CLI_ARGS}}

  db:
    desc: "Run the migration CLI"
    cmds:
      - uv run python -m dtrack {{.CLI_ARGS}}

  build:
    desc: "Build the docker image"
    cmds:
      - docker build -t local/dtrack-cli:latest .

  publish:
    desc: "Publish the docker image to tar file"
    deps:
      - build
    cmds:
      - mkdir -p dist
      - docker save -o dist/dtrack.tar local/dtrack-cli:latest

  dump:
    desc: "D"
